---
- name: Verify K3s services on all devices
  hosts: devices
  gather_facts: false
  become: true

  tasks:
    - name: Check if K3s service exists
      ansible.builtin.shell: systemctl is-active k3s || systemctl is-active k3s-agent
      register: k3s_service_state
      changed_when: false

    - name: Print K3s service state
      ansible.builtin.debug:
        msg: "{{ inventory_hostname }} service state: {{ k3s_service_state.stdout }}"

- name: Verify cluster and Argo CD from server
  hosts: master_node
  gather_facts: false
  become: true

  tasks:
    - name: Get cluster nodes
      ansible.builtin.command: k3s kubectl get nodes -o wide
      register: cluster_nodes
      changed_when: false

    - name: Show cluster nodes
      ansible.builtin.debug:
        var: cluster_nodes.stdout_lines

    - name: Get Argo CD pods
      ansible.builtin.command: k3s kubectl get pods -n argocd
      register: argocd_pods
      changed_when: false
      failed_when: false

    - name: Show Argo CD pod status
      ansible.builtin.debug:
        var: argocd_pods.stdout_lines
